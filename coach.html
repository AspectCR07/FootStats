<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .chart-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
        }
        
        .chart {
            width: 48%;
            max-width: 500px;
            min-width: 300px;
            height: 400px;
            margin-bottom: 30px;
        }

        .return-btn {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
        }

        .return-btn:hover {
            background-color: #0056b3;
        }
        
        @media (max-width: 768px) {
            .chart {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>Coach Performance</h1>

    <div class="chart-container">
        <div class="chart">
            <h2>Wins Distribution (Pie Chart)</h2>
            <canvas id="coachWinsPieChart"></canvas>
        </div>
        <div class="chart">
            <h2>Wins per Coach (Bar Chart)</h2>
            <canvas id="coachWinsBarChart"></canvas>
        </div>
    </div>

    <!-- Return button to go back to logout page -->
    <button class="return-btn" onclick="window.location.href='logout.html';">Return to Logout</button>

    <script>
        // Sample data (replace with your actual data fetching logic)
        const coachData = [
            { coach_name: "Pep Guardiola", wins: 30 },
            { coach_name: "Jürgen Klopp", wins: 28 },
            { coach_name: "Antonio Conte", wins: 25 },
            { coach_name: "Zinedine Zidane", wins: 35 },
            { coach_name: "Mikel Arteta", wins: 20 },
            { coach_name: "Thomas Tuchel", wins: 18 },
            { coach_name: "Mauricio Pochettino", wins: 22 },
            { coach_name: "Carlo Ancelotti", wins: 33 },
            { coach_name: "Jose Mourinho", wins: 15 },
            { coach_name: "Brendan Rodgers", wins: 17 }
        ];

        // Prepare data for Pie Chart
        const pieChartLabels = coachData.map(coach => coach.coach_name);
        const pieChartData = coachData.map(coach => coach.wins);

        const pieCtx = document.getElementById('coachWinsPieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: pieChartLabels,
                datasets: [{
                    data: pieChartData,
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.7)',
                        'rgba(54, 162, 235, 0.7)',
                        'rgba(255, 206, 86, 0.7)',
                        'rgba(75, 192, 192, 0.7)',
                        'rgba(153, 102, 255, 0.7)',
                        'rgba(255, 159, 64, 0.7)',
                        'rgba(199, 21, 133, 0.7)',
                        'rgba(0, 128, 0, 0.7)',
                        'rgba(255, 140, 0, 0.7)',
                        'rgba(0, 0, 255, 0.7)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                    },
                    title: {
                        display: true,
                        text: 'Wins Distribution by Coach'
                    }
                }
            }
        });

        // Prepare data for Bar Chart
        const barChartLabels = coachData.map(coach => coach.coach_name);
        const barChartData = coachData.map(coach => coach.wins);

        const barCtx = document.getElementById('coachWinsBarChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: barChartLabels,
                datasets: [{
                    label: 'Wins',
                    data: barChartData,
                    backgroundColor: 'rgba(75, 192, 192, 0.7)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Number of Wins'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Coach Name'
                        },
                        ticks: {
                            autoSkip: false, // Prevent labels from overlapping
                            maxRotation: 90 // Rotate labels for better readability
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: true,
                        text: 'Number of Wins by Each Coach'
                    }
                }
            }
        });
    </script>

</body>
</html>
